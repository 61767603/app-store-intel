<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iOS App Store 情报仪表盘</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f172a;--card:#1e293b;--border:#334155;--accent:#6366f1;--text:#e2e8f0;--muted:#94a3b8;--red:#ef4444;--orange:#f59e0b;--green:#22c55e;--amber:#fbbf24}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;line-height:1.6}
.container{max-width:1400px;margin:0 auto;padding:16px}
h1{text-align:center;font-size:1.6rem;margin-bottom:16px;color:var(--accent)}
h2{font-size:1.2rem;margin:24px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border);color:var(--text)}
h2 .badge{font-size:.75rem;background:var(--accent);color:#fff;border-radius:8px;padding:2px 8px;margin-left:8px;vertical-align:middle}
.controls{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.controls label{color:var(--muted);font-size:.875rem}
select,input{background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:.875rem;outline:none}
select:focus,input:focus{border-color:var(--accent)}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
.stat-card .label{font-size:.75rem;color:var(--muted);margin-bottom:4px}
.stat-card .value{font-size:1.4rem;font-weight:700;color:var(--accent)}
.stat-card .value.red{color:var(--red)}
.stat-card .value.orange{color:var(--orange)}
.table-wrap{overflow-x:auto;margin-bottom:24px}
table{width:100%;border-collapse:collapse;font-size:.8rem}
th{background:var(--card);color:var(--muted);padding:8px 6px;text-align:left;position:sticky;top:0;border-bottom:2px solid var(--border);white-space:nowrap;z-index:1;cursor:pointer;user-select:none}
th:hover{color:var(--text)}
th .sort-arrow{font-size:.7rem;margin-left:2px;opacity:.3}
th.sorted-asc .sort-arrow,th.sorted-desc .sort-arrow{opacity:1;color:var(--accent)}
th.sorted-asc .sort-arrow::after{content:'▲'}
th.sorted-desc .sort-arrow::after{content:'▼'}
td{padding:7px 6px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:hover{background:rgba(99,102,241,.08)}
.app-cell{display:flex;align-items:center;gap:6px;text-decoration:none;color:var(--text)}
.app-cell:hover{color:var(--accent)}
.app-cell img{width:40px;height:40px;border-radius:8px;object-fit:cover;flex-shrink:0}
.app-cell .placeholder{width:40px;height:40px;border-radius:8px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1rem;flex-shrink:0}
.app-cell .name{max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rating-red{color:var(--red)}
.rating-orange{color:#fb923c}
.rating-yellow{color:var(--amber)}
.rating-green{color:#a3e635}
.price-free{color:var(--green);font-weight:600}
.price-paid{color:var(--amber)}
.potential-bar{display:flex;align-items:center;gap:6px}
.potential-bar .bar{width:60px;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.potential-bar .bar .fill{height:100%;border-radius:4px}
.potential-bar .bar .fill.red{background:var(--red)}
.potential-bar .bar .fill.orange{background:var(--orange)}
.potential-bar .bar .fill.gray{background:var(--muted)}
.row-highlight{background:rgba(239,68,68,.12)}
.row-highlight td{border-bottom-color:rgba(239,68,68,.25)}
.link{color:var(--accent);cursor:pointer;text-decoration:none}
.link:hover{text-decoration:underline}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.cat-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px}
.cat-card h3{font-size:.95rem;margin-bottom:8px;color:var(--accent)}
.cat-app{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:.8rem}
.cat-app img{width:24px;height:24px;border-radius:4px;object-fit:cover}
.cat-app .placeholder-sm{width:24px;height:24px;border-radius:4px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:.65rem}
.cat-app .rank{color:var(--muted);width:20px;text-align:right;flex-shrink:0}
.cat-app .cname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text);text-decoration:none}
.cat-app .cname:hover{color:var(--accent)}
.cat-app .rev{color:var(--muted);white-space:nowrap}
.loading{text-align:center;padding:40px;color:var(--muted)}
.error{color:var(--red);text-align:center;padding:20px}
.empty{text-align:center;padding:20px;color:var(--muted)}
.filter-row{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.filter-row input{min-width:180px}
@media(max-width:768px){.container{padding:10px}h1{font-size:1.2rem}table{font-size:.7rem}td,th{padding:5px 4px}.stats{grid-template-columns:repeat(3,1fr)}.grid{grid-template-columns:1fr}}
.cat-link{color:var(--accent);cursor:pointer;text-decoration:none}
.cat-link:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="container">
<h1>📱 iOS App Store 情报仪表盘</h1>
<div class="controls">
  <label>🌍 国家/地区</label>
  <select id="countrySelect"></select>
  <span id="dateInfo" style="color:var(--muted);font-size:.8rem"></span>
</div>
<div class="stats" id="statsArea"></div>

<h2>畅销总榜 Top 20 <span class="badge" id="overallCount">0</span></h2>
<div class="table-wrap"><table id="overallTable"><thead><tr>
<th data-key="rank" data-type="num">#<span class="sort-arrow"></span></th><th data-key="app_name" data-type="str">应用</th><th data-key="developer_name" data-type="str">开发者</th><th data-key="rating_avg" data-type="num">评分<span class="sort-arrow"></span></th><th data-key="rating_count" data-type="num">评分数<span class="sort-arrow"></span></th><th data-key="price_sort" data-type="num">价格</th><th data-key="est_downloads" data-type="num">预估下载<span class="sort-arrow"></span></th><th data-key="est_revenue_high" data-type="num">预估收入<span class="sort-arrow"></span></th>
</tr></thead><tbody></tbody></table></div>

<h2>闷声型 <span class="badge" id="quietCount">0</span></h2>
<div class="filter-row">
  <select id="quietCatFilter"><option value="">全部分类</option></select>
  <input id="quietSearch" placeholder="搜索应用名..." type="text">
</div>
<div class="table-wrap"><table id="quietTable"><thead><tr>
<th data-key="rank_category" data-type="num">分类排名<span class="sort-arrow"></span></th><th data-key="overall_rank" data-type="num">总排名<span class="sort-arrow"></span></th><th data-key="category_name" data-type="str">分类</th><th data-key="app_name" data-type="str">应用</th><th data-key="developer_name" data-type="str">开发者</th><th data-key="rating_count" data-type="num">评分数<span class="sort-arrow"></span></th><th data-key="rating_avg" data-type="num">评分<span class="sort-arrow"></span></th><th data-key="price_sort" data-type="num">价格</th><th data-key="est_downloads" data-type="num">预估下载<span class="sort-arrow"></span></th><th data-key="est_revenue_high" data-type="num">预估收入<span class="sort-arrow"></span></th><th data-key="potential" data-type="num">潜力指数<span class="sort-arrow"></span></th>
</tr></thead><tbody></tbody></table></div>

<h2>草根型 <span class="badge" id="indieCount">0</span></h2>
<div class="filter-row">
  <select id="indieCatFilter"><option value="">全部分类</option></select>
  <input id="indieSearch" placeholder="搜索应用名..." type="text">
</div>
<div class="table-wrap"><table id="indieTable"><thead><tr>
<th data-key="rank_category" data-type="num">分类排名<span class="sort-arrow"></span></th><th data-key="overall_rank" data-type="num">总排名<span class="sort-arrow"></span></th><th data-key="category_name" data-type="str">分类</th><th data-key="app_name" data-type="str">应用</th><th data-key="developer_name" data-type="str">开发者</th><th data-key="rating_count" data-type="num">评分数<span class="sort-arrow"></span></th><th data-key="rating_avg" data-type="num">评分<span class="sort-arrow"></span></th><th data-key="price_sort" data-type="num">价格</th><th data-key="rev_type" data-type="str">类型</th><th data-key="est_downloads" data-type="num">预估下载<span class="sort-arrow"></span></th><th data-key="est_revenue_high" data-type="num">预估收入<span class="sort-arrow"></span></th><th data-key="potential" data-type="num">潜力指数<span class="sort-arrow"></span></th>
</tr></thead><tbody></tbody></table></div>

<h2>🔥 低分高收型 <span class="badge" id="lowRatCount">0</span></h2>
<p style="font-size:.8rem;color:var(--muted);margin-bottom:8px">评分 &lt;4.0 且 排名 ≤200，点击分类名查看详情</p>
<div class="filter-row">
  <select id="lowRatCatFilter"><option value="">全部分类</option></select>
</div>
<div class="table-wrap"><table id="lowRatTable"><thead><tr>
<th data-key="rank_category" data-type="num">分类排名<span class="sort-arrow"></span></th><th data-key="overall_rank" data-type="num">总排名<span class="sort-arrow"></span></th><th data-key="category_name" data-type="str">分类</th><th data-key="app_name" data-type="str">应用</th><th data-key="developer_name" data-type="str">开发者</th><th data-key="rating_count" data-type="num">评分数<span class="sort-arrow"></span></th><th data-key="rating_avg" data-type="num">评分<span class="sort-arrow"></span></th><th data-key="price_sort" data-type="num">价格</th><th data-key="est_downloads" data-type="num">预估下载<span class="sort-arrow"></span></th><th data-key="est_revenue_high" data-type="num">预估收入<span class="sort-arrow"></span></th><th data-key="potential" data-type="num">潜力指数<span class="sort-arrow"></span></th>
</tr></thead><tbody></tbody></table></div>

<h2>各品类 Top 10</h2>
<div class="grid" id="categoryGrid"></div>
</div>

<script>
const STATE={country:'us',overview:null,overallTop:[],quietGems:{data:[],total:0},indieGems:{data:[],total:0},lowRating:{data:[],total:0},categories:[],categoryTop:{}};

const COUNTRY_LABELS={
  us:'🇺🇸 美国 (US)',jp:'🇯🇵 日本 (JP)',br:'🇧🇷 巴西 (BR)',gb:'🇬🇧 英国 (GB)',de:'🇩🇪 德国 (DE)',fr:'🇫🇷 法国 (FR)',
  kr:'🇰🇷 韩国 (KR)',ca:'🇨🇦 加拿大 (CA)',au:'🇦🇺 澳大利亚 (AU)',in:'🇮🇳 印度 (IN)',it:'🇮🇹 意大利 (IT)',es:'🇪🇸 西班牙 (ES)',
  mx:'🇲🇽 墨西哥 (MX)',ru:'🇷🇺 俄罗斯 (RU)',cn:'🇨🇳 中国 (CN)',tw:'🇹🇼 台湾 (TW)',hk:'🇭🇰 香港 (HK)',sg:'🇸🇬 新加坡 (SG)',
  th:'🇹🇭 泰国 (TH)',vn:'🇻🇳 越南 (VN)',id:'🇮🇩 印尼 (ID)',my:'🇲🇾 马来西亚 (MY)',ph:'🇵🇭 菲律宾 (PH)',tr:'🇹🇷 土耳其 (TR)',
  sa:'🇸🇦 沙特 (SA)',ae:'🇦🇪 阿联酋 (AE)',eg:'🇪🇬 埃及 (EG)',za:'🇿🇦 南非 (ZA)',ng:'🇳🇬 尼日利亚 (NG)',se:'🇸🇪 瑞典 (SE)',
  no:'🇳🇴 挪威 (NO)',dk:'🇩🇰 丹麦 (DK)',fi:'🇫🇮 芬兰 (FI)',nl:'🇳🇱 荷兰 (NL)',be:'🇧🇪 比利时 (BE)',at:'🇦🇹 奥地利 (AT)',
  ch:'🇨🇭 瑞士 (CH)',pt:'🇵🇹 葡萄牙 (PT)',pl:'🇵🇱 波兰 (PL)',cz:'🇨🇿 捷克 (CZ)',hu:'🇭🇺 匈牙利 (HU)',ro:'🇷🇴 罗马尼亚 (RO)',
  il:'🇮🇱 以色列 (IL)',nz:'🇳🇿 新西兰 (NZ)',ie:'🇮🇪 爱尔兰 (IE)',cl:'🇨🇱 智利 (CL)',co:'🇨🇴 哥伦比亚 (CO)',ar:'🇦🇷 阿根廷 (AR)'
};

function countryLabel(code){return COUNTRY_LABELS[code]||code.toUpperCase()}

function formatCount(n){
  if(n==null)return'-';
  if(n>=1e6)return(n/1e6).toFixed(1)+'M';
  if(n>=1e3)return(n/1e3).toFixed(1)+'K';
  return String(n);
}

function formatPrice(p){
  if(p==null||p===0||p==='0'||p==='Free')return '<span class="price-free">Free</span>';
  const v=typeof p==='number'?p:parseFloat(p);
  if(isNaN(v)||v===0)return '<span class="price-free">Free</span>';
  return '<span class="price-paid">$'+v.toFixed(2)+'</span>';
}

function formatDownloads(d){
  if(d==null)return'-';
  if(d>=10000)return(d/10000).toFixed(1)+'万/月';
  if(d>=1000)return(d/1000).toFixed(1)+'千/月';
  return d+'/月';
}

function formatRevenue(lo,hi){
  if(lo==null&&hi==null)return'-';
  const fmt=v=>{
    if(v>=10000)return'$'+(v/10000).toFixed(1)+'万';
    if(v>=1000)return'$'+(v/1000).toFixed(1)+'千';
    return '$'+v;
  };
  return fmt(lo)+'-'+fmt(hi)+'/月';
}

function ratingStars(r){
  if(r==null)return'-';
  const full=Math.floor(r);
  const half=(r-full)>=0.25&&(r-full)<0.75?1:0;
  const empty=5-full-half;
  let s='';
  for(let i=0;i<full;i++)s+='★';
  if(half)s+='½';
  for(let i=0;i<empty;i++)s+='☆';
  let cls=r<3.0?'rating-red':r<3.5?'rating-orange':r<4.0?'rating-yellow':'rating-green';
  return '<span class="'+cls+'">'+s+'</span> '+r.toFixed(1);
}

function potentialBar(p){
  if(p==null)return'-';
  let cls=p>70?'red':p>=40?'orange':'gray';
  return '<div class="potential-bar"><div class="bar"><div class="fill '+cls+'" style="width:'+p+'%"></div></div><span>'+p+'</span></div>';
}

function appIcon(url,name,id){
  const letter=(name||'?')[0].toUpperCase();
  const cc=STATE.country||'us';
  const href='https://apps.apple.com/'+cc+'/app/id'+id;
  if(url){
    return '<a class="app-cell" href="'+href+'" target="_blank"><img src="'+url+'" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'" alt=""><div class="placeholder" style="display:none">'+letter+'</div><span class="name">'+esc(name)+'</span></a>';
  }
  return '<a class="app-cell" href="'+href+'" target="_blank"><div class="placeholder">'+letter+'</div><span class="name">'+esc(name)+'</span></a>';
}

function esc(s){
  if(!s)return'';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function td(html){return '<td>'+html+'</td>'}

function catMap(){
  const m={};
  (STATE.categories||[]).forEach(c=>{m[c.id]=c.name});
  return m;
}

async function api(path){
  const r=await fetch(path);
  if(!r.ok)throw new Error('API error: '+r.status);
  return r.json();
}

function renderStats(){
  const o=STATE.overview;
  if(!o)return;
  const cards=[
    {label:'分类数',value:o.categories||0},
    {label:'应用数',value:o.apps!=null?formatCount(o.apps):'-'},
    {label:'详情数',value:o.details!=null?formatCount(o.details):'-'},
    {label:'闷声型',value:o.quiet_count!=null?o.quiet_count:'-',cls:''},
    {label:'草根型',value:o.indie_count!=null?o.indie_count:'-',cls:''},
    {label:'低分高收型',value:o.low_rat_count!=null?o.low_rat_count:'-',cls:'red'}
  ];
  document.getElementById('statsArea').innerHTML=cards.map(c=>
    '<div class="stat-card"><div class="label">'+c.label+'</div><div class="value'+(c.cls?' '+c.cls:'')+'">'+c.value+'</div></div>'
  ).join('');
  document.getElementById('dateInfo').textContent=o.date?'数据日期: '+o.date:'';
}

function renderOverall(){
  STATE.overallTop.forEach(a=>{a.price_sort=parsePriceNum(a.price);});
  const s=sortState.overallTable;
  const sorted=sortData(STATE.overallTop,s.key,'num',s.dir);
  const tb=document.querySelector('#overallTable tbody');
  document.getElementById('overallCount').textContent=STATE.overallTop.length;
  tb.innerHTML=sorted.map(a=>
    '<tr>'+td(a.rank)+td(appIcon(a.icon_url,a.app_name,a.app_id))+td(esc(a.developer_name))+td(ratingStars(a.rating_avg))+td(formatCount(a.rating_count))+td(formatPrice(a.price))+td(formatDownloads(a.est_downloads))+td(formatRevenue(a.est_revenue_low,a.est_revenue_high))+'</tr>'
  ).join('');
  applySort('overallTable');
}

function renderTable(tableId,data,cols){
  const tb=document.querySelector('#'+tableId+' tbody');
  if(!data.length){tb.innerHTML='<tr><td colspan="'+cols+'" class="empty">暂无数据</td></tr>';return;}
  data.forEach(a=>{if('price' in a)a.price_sort=parsePriceNum(a.price);});
  const s=sortState[tableId];
  const type=document.querySelector('#'+tableId+' th[data-key="'+s.key+'"]')?.dataset?.type||'num';
  const sorted=sortData(data,s.key,type,s.dir);
  tb.innerHTML=sorted.map(a=>{
    // add price_sort for sorting
    if(a.price!==undefined)a.price_sort=parsePriceNum(a.price);
    const cls=a.rating_avg!=null&&a.rating_avg<3.5?' class="row-highlight"':'';
    return '<tr'+cls+'>'+td(a.rank_category||a.rank||'-')+td(a.overall_rank||'-')+td(a.category_name?('<span class="cat-link" data-cid="'+a.category_id+'">'+esc(a.category_name)+'</span>'):'-')+td(appIcon(a.icon_url,a.app_name,a.app_id))+td(esc(a.developer_name))+td(formatCount(a.rating_count))+td(ratingStars(a.rating_avg))+td(formatPrice(a.price))+(a.rev_type!==undefined?td(esc(a.rev_type)):'')+td(formatDownloads(a.est_downloads))+td(formatRevenue(a.est_revenue_low,a.est_revenue_high))+td(potentialBar(a.potential))+'</tr>';
  }).join('');
  applySort(tableId);
}

let quietAll=[], indieAll=[], lowRatAll=[];

function applyFilters(){
  const cm=catMap();
  const qc=document.getElementById('quietCatFilter').value;
  const qs=document.getElementById('quietSearch').value.toLowerCase();
  let filtered=quietAll;
  if(qc)filtered=filtered.filter(a=>String(a.category_id)===String(qc));
  if(qs)filtered=filtered.filter(a=>(a.app_name||'').toLowerCase().includes(qs));
  renderTable('quietTable',filtered,11);

  const ic=document.getElementById('indieCatFilter').value;
  const is_=document.getElementById('indieSearch').value.toLowerCase();
  let ifilt=indieAll;
  if(ic)ifilt=ifilt.filter(a=>String(a.category_id)===String(ic));
  if(is_)ifilt=ifilt.filter(a=>(a.app_name||'').toLowerCase().includes(is_));
  renderTable('indieTable',ifilt,12);
}

function renderQuiet(){
  document.getElementById('quietCount').textContent=STATE.quietGems.total;
  quietAll=STATE.quietGems.data;
  const cm=catMap();
  const sel=document.getElementById('quietCatFilter');
  const prev=sel.value;
  sel.innerHTML='<option value="">全部分类</option>'+quietAll.filter(a=>a.category_id).map(a=>a.category_id).filter((v,i,arr)=>arr.indexOf(v)===i).map(id=>'<option value="'+id+'">'+(cm[id]||id)+'</option>').join('');
  sel.value=prev;
  applyFilters();
}

function renderIndie(){
  document.getElementById('indieCount').textContent=STATE.indieGems.total;
  indieAll=STATE.indieGems.data;
  const cm=catMap();
  const sel=document.getElementById('indieCatFilter');
  const prev=sel.value;
  sel.innerHTML='<option value="">全部分类</option>'+indieAll.filter(a=>a.category_id).map(a=>a.category_id).filter((v,i,arr)=>arr.indexOf(v)===i).map(id=>'<option value="'+id+'">'+(cm[id]||id)+'</option>').join('');
  sel.value=prev;
  applyFilters();
}

function renderLowRating(){
  document.getElementById('lowRatCount').textContent=STATE.lowRating.total;
  lowRatAll=STATE.lowRating.data;
  const cm=catMap();
  const sel=document.getElementById('lowRatCatFilter');
  const prev=sel.value;
  sel.innerHTML='<option value="">全部分类</option>'+lowRatAll.filter(a=>a.category_id).map(a=>a.category_id).filter((v,i,arr)=>arr.indexOf(v)===i).map(id=>'<option value="'+id+'">'+(cm[id]||id)+'</option>').join('');
  sel.value=prev;
  applyLowRatFilter();
}

function applyLowRatFilter(){
  const fv=document.getElementById('lowRatCatFilter').value;
  let filtered=lowRatAll;
  if(fv)filtered=filtered.filter(a=>String(a.category_id)===fv);
  renderTable('lowRatTable',filtered,11);
}

function renderCategoryGrid(){
  const grid=document.getElementById('categoryGrid');
  const topData=STATE.categoryTop;
  if(!Object.keys(topData).length){grid.innerHTML='<p class="empty">暂无数据</p>';return;}
  grid.innerHTML=Object.entries(topData).map(([catId,apps])=>{
    const catName=(catMap()[catId])||catId;
    const items=apps.slice(0,10).map(a=>{
      const letter=(a.app_name||'?')[0].toUpperCase();
      const cc=STATE.country||'us';
      const href='https://apps.apple.com/'+cc+'/app/id'+a.app_id;
      const img=a.icon_url?'<img src="'+a.icon_url+'" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'" alt=""><div class="placeholder-sm" style="display:none">'+letter+'</div>':'<div class="placeholder-sm">'+letter+'</div>';
      return '<div class="cat-app"><span class="rank">'+a.rank+'</span><a class="cname" href="'+href+'" target="_blank">'+img+' '+esc(a.app_name)+'</a><span class="rev">'+formatRevenue(a.est_revenue_low,a.est_revenue_high)+'</span></div>';
    }).join('');
    return '<div class="cat-card"><h3>'+esc(catName)+'</h3>'+items+'</div>';
  }).join('');
}

  const c=STATE.country;
  const loaders=[
    api('/api/overview?country='+c).then(d=>{STATE.overview=d;renderStats();initCountrySelect()}),
    api('/api/overall_top?country='+c).then(d=>{STATE.overallTop=d;renderOverall()}),
    api('/api/quiet_gems?country='+c+'&page=1&per_page=100').then(d=>{STATE.quietGems=d;renderQuiet()}),
    api('/api/indie_gems?country='+c+'&page=1&per_page=100').then(d=>{STATE.indieGems=d;renderIndie()}),
    api('/api/categories').then(d=>{STATE.categories=d}),
  ];
  await Promise.all(loaders);
  const lowRatUrl='/api/low_rating?country='+c+'&page=1&per_page=200';
  await api(lowRatUrl).then(d=>{STATE.lowRating=d;renderLowRating()}).catch(()=>{STATE.lowRating={data:[],total:0};renderLowRating()});
  const cats=STATE.categories||[];

    api('/api/category_top?country='+c+'&category_id='+cat.id).then(d=>{STATE.categoryTop[cat.id]=d}).catch(()=>{})
  );
  await Promise.all(catProms);
  renderCategoryGrid();
}

// ==================== 排序系统（事件委托，不会因重渲染丢失） ====================
const sortState={overallTable:{key:'rank',dir:'asc'},quietTable:{key:'potential',dir:'desc'},indieTable:{key:'potential',dir:'desc'},lowRatTable:{key:'potential',dir:'desc'}};

function sortData(data,key,type,dir){
  return [...data].sort((a,b)=>{
    let va=a[key],vb=b[key];
    if(key==='price_sort'){va=parsePriceNum(a.price);vb=parsePriceNum(b.price);}
    if(key==='overall_rank'){va=va||9999;vb=vb||9999;}
    if(va==null)va=type==='num'?9999:'';
    if(vb==null)vb=type==='num'?9999:'';
    if(type==='num'){va=Number(va);vb=Number(vb);return dir==='asc'?va-vb:vb-va;}
    return dir==='asc'?String(va).localeCompare(String(vb)):String(vb).localeCompare(String(va));
  });
}

function parsePriceNum(p){
  if(p==null||p==='Free'||p==='Get')return 0;
  const v=parseFloat(String(p).replace(/[^0-9.]/g,''));
  return isNaN(v)?0:v;
}

function applySort(tableId){
  const table=document.getElementById(tableId);
  if(!table)return;
  const ths=table.querySelectorAll('thead th[data-key]');
  ths.forEach(th=>{
    th.classList.remove('sorted-asc','sorted-desc');
    if(th.dataset.key===sortState[tableId].key){
      th.classList.add(sortState[tableId].dir==='asc'?'sorted-asc':'sorted-desc');
    }
  });
}

// 全局事件委托处理排序点击
document.addEventListener('click',function(e){
  const th=e.target.closest('th[data-key]');
  if(!th)return;
  const table=th.closest('table');
  if(!table)return;
  const tableId=table.id;
  if(!sortState[tableId])return;
  const key=th.dataset.key;
  const type=th.dataset.type||'str';
  const s=sortState[tableId];
  if(s.key===key){s.dir=s.dir==='asc'?'desc':'asc';}else{s.key=key;s.dir=type==='num'?'desc':'asc';}
  if(tableId==='overallTable')renderOverall();
  else if(tableId==='quietTable')applyFilters();
  else if(tableId==='indieTable')applyFilters();
  else if(tableId==='lowRatTable')applyLowRatFilter();
});
